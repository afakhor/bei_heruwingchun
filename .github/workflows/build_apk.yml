name: Build Android APK (C++ Integrated)

on:
  push:
    branches:
      - main  # Trigger otomatis berjalan setiap kamu push ke branch main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil semua kode dari repositori GitHub kamu
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Siapkan environment Java 17 (Wajib untuk Gradle Android modern)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 3. Pasang SDK Flutter versi stabil terbaru di server cloud
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Ambil semua library dependency yang terdaftar di pubspec.yaml
      - name: Install Flutter Dependencies
        run: flutter pub get

      # 5. Jalankan tools otomatisasi aplikasi (Menggunakan dart run modern)
      - name: Change Package Name
        run: dart run change_app_package_name:main com.porto.heruwingchun

      # Pastikan file assets/icon/app_icon.png sudah kamu push ke git sebelum menjalankan ini
      - name: Generate App Icon
        run: dart run flutter_launcher_icons

      - name: Generate Splash Screen
        run: dart run flutter_native_splash:create

      # 6. PENYELAMAT C++: Setel Android NDK Environment agar CMake mendeteksi compiler C++
      - name: Set up Android NDK Path
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      # 7. Proses Kompilasi Utama: Mengompilasi C++ dan Dart menjadi satu kesatuan
      - name: Build Release APK
        run: flutter build apk --release

      # 8. Upload hasilnya (Menggunakan wildcard app-*.apk agar file signed maupun unsigned tetap terangkat)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bei-trade-app-release
          path: build/app/outputs/flutter-apk/app-*.apk
